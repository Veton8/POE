workflows:
  ios-altstore:
    name: iOS unsigned IPA (sideload via AltStore)
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      vars:
        GODOT_VERSION: "4.6.2"
        BUNDLE_ID: "com.pathofevil.game"
    scripts:
      - name: Install Godot for macOS
        script: |
          set -e
          curl -fL -o godot.zip \
            "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_macos.universal.zip"
          unzip -q godot.zip
          GODOT_BIN="$(pwd)/Godot.app/Contents/MacOS/Godot"
          chmod +x "$GODOT_BIN"
          echo "GODOT_BIN=$GODOT_BIN" >> $CM_ENV

      - name: Install iOS export templates
        script: |
          set -e
          curl -fL -o templates.tpz \
            "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_export_templates.tpz"
          TEMPLATE_DIR="$HOME/Library/Application Support/Godot/export_templates/${GODOT_VERSION}.stable"
          mkdir -p "$TEMPLATE_DIR"
          unzip -q -j templates.tpz "templates/*" -d "$TEMPLATE_DIR"

      - name: Import project assets
        script: |
          set -e
          "$GODOT_BIN" --headless --import . || true

      - name: Export Xcode project from Godot
        script: |
          set -e
          mkdir -p ios
          "$GODOT_BIN" --headless --export-debug "iOS" "ios/path_of_evil.xcodeproj"
          ls -la ios/

      - name: Build with ad-hoc signing
        script: |
          set -e
          cd ios
          SCHEME=$(xcodebuild -list -project path_of_evil.xcodeproj -json 2>/dev/null \
            | python3 -c "import json,sys; print(json.load(sys.stdin)['project']['schemes'][0])")
          echo "Detected scheme: $SCHEME"
          xcodebuild -project path_of_evil.xcodeproj \
            -scheme "$SCHEME" \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath build/path_of_evil.xcarchive \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            archive

      - name: Package as IPA for AltStore
        script: |
          set -e
          cd ios/build
          mkdir -p Payload
          APP_DIR=$(find path_of_evil.xcarchive/Products/Applications -maxdepth 1 -name "*.app" -type d | head -1)
          if [ -z "$APP_DIR" ]; then
            echo "No .app found in archive — listing for debugging:"
            ls -R path_of_evil.xcarchive/
            exit 1
          fi
          echo "Packaging: $APP_DIR"
          cp -R "$APP_DIR" Payload/
          zip -qr path_of_evil_unsigned.ipa Payload
          ls -lh path_of_evil_unsigned.ipa
    artifacts:
      - ios/build/path_of_evil_unsigned.ipa
    publishing:
      email:
        recipients:
          - veton222222@gmail.com
        notify:
          success: true
          failure: true
